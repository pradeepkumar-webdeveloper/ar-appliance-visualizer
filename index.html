<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR Home Appliance Visualizer</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body>
  <!-- UI Overlay -->
  <div id="ui-overlay">
    <h2>🏠 AR Appliance Visualizer</h2>
    <p>Point camera at a flat surface to place appliance</p>
    <div id="appliance-buttons">
      <button onclick="selectAppliance('fridge')" class="btn">🧊 Fridge</button>
      <button onclick="selectAppliance('washer')" class="btn">🫧 Washer</button>
      <button onclick="selectAppliance('tv')"     class="btn">📺 TV</button>
    </div>
    <div id="controls">
      <button onclick="scaleUp()"   class="ctrl-btn">➕ Scale Up</button>
      <button onclick="scaleDown()" class="ctrl-btn">➖ Scale Down</button>
      <button onclick="rotateLeft()"  class="ctrl-btn">↺ Rotate</button>
    </div>
  </div>

  <!-- AR Scene -->
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true;"
    vr-mode-ui="enabled: false">

    <a-marker preset="hiro" id="marker">
      <a-entity id="appliance-model"
        geometry="primitive: box; width: 0.5; height: 0.8; depth: 0.5"
        material="color: #silver; metalness: 0.8; roughness: 0.2"
        position="0 0.4 0"
        rotation="0 0 0"
        scale="1 1 1">
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script src="js/app.js"></script>
</body>
</html>
